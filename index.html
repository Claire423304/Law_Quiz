<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>律師高考題庫 Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .ai-btn { background: linear-gradient(90deg, #4285F4, #34A853, #FBBC05, #EA4335); }
        .option-btn { transition: all 0.2s; }
        .count-btn { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .count-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        #export-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-5 border">
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-1">
                ⚖️ 律師高考題庫 Pro <span id="header-subject" class="text-blue-600 text-sm font-medium"></span>
            </h1>
            <div class="flex gap-2">
                <button onclick="triggerFileInput()" class="text-[10px] text-blue-500 underline font-medium">更新題庫</button>
                <button onclick="clearErrorBook()" class="text-[10px] text-red-400 underline font-medium">清空數據</button>
            </div>
        </div>
        
        <div id="loading-status" class="text-center py-20">
            <div class="inline-block animate-spin mb-4 text-blue-600 text-2xl">🌀</div>
            <div class="text-gray-400 font-bold text-sm tracking-widest">系統讀取中...</div>
        </div>

        <div id="setup-section" class="hidden">
            <div class="flex flex-col items-center mb-6">
                <div class="flex gap-2 mb-2">
                    <button onclick="backupProgress()" class="text-xs bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold border border-blue-100 shadow-sm transition">💾 備份進度</button>
                    <button onclick="triggerRestoreInput()" class="text-xs bg-green-50 text-green-700 px-4 py-2 rounded-lg font-bold border border-green-200 shadow-sm transition">➕ 合併進度</button>
                    <input type="file" id="restore-input" accept=".json" class="hidden" onchange="mergeProgress(this)">
                </div>
                <p id="backup-time-display" class="text-[10px] text-gray-400 italic">資料將自動從瀏覽器帶入</p>
            </div>

            <div id="upload-area" class="mb-6 p-8 border-2 border-dashed border-gray-100 rounded-xl text-center">
                <input type="file" id="file-input" accept=".json" class="hidden">
                <button onclick="triggerFileInput()" class="bg-blue-600 text-white px-8 py-2.5 rounded-lg font-bold shadow-md active:scale-95 transition">載入題庫 JSON</button>
            </div>

            <div id="config-area" class="space-y-6">
                <div id="error-notice" class="bg-red-50 p-4 rounded-xl mb-4 hidden border border-red-100 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-red-800 text-sm font-bold flex items-center gap-1">
                            <span>⚠️ 當前科目錯題：</span><span id="error-count" class="text-lg">0</span> 題
                        </p>
                        <button onclick="openExportModal()" class="text-[10px] bg-white text-red-500 border border-red-200 px-3 py-1.5 rounded-lg font-bold shadow-sm">📋 匯出筆記</button>
                    </div>
                    <button onclick="startQuiz(true)" class="w-full bg-red-500 text-white py-3 rounded-xl text-sm font-bold shadow-lg transform active:scale-95 transition">開始錯題複習</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2">1. 年度</label>
                        <select id="year-select" class="w-full p-3 border border-gray-100 rounded-xl bg-gray-50 text-sm font-medium outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2">2. 科目</label>
                        <select id="subject-select" class="w-full p-3 border border-gray-100 rounded-xl bg-gray-50 text-sm font-bold text-blue-600 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2">3. 題型</label>
                        <select id="type-filter" class="w-full p-3 border border-gray-100 rounded-xl bg-gray-50 text-sm font-bold text-blue-600 outline-none">
                            <option value="ALL">混合模式</option>
                            <option value="SINGLE">單選題</option>
                            <option value="MULTI">複選題</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2">4. 練習題數</label>
                    <div class="grid grid-cols-3 md:grid-cols-6 gap-2 mb-3">
                        <button type="button" onclick="setCount(10, this)" class="count-btn p-2.5 rounded-xl text-sm font-bold active">10</button>
                        <button type="button" onclick="setCount(20, this)" class="count-btn p-2.5 rounded-xl text-sm font-bold">20</button>
                        <button type="button" onclick="setCount(30, this)" class="count-btn p-2.5 rounded-xl text-sm font-bold">30</button>
                        <button type="button" onclick="setCount(50, this)" class="count-btn p-2.5 rounded-xl text-sm font-bold">50</button>
                        <button type="button" onclick="setCount('ALL', this)" class="count-btn p-2.5 rounded-xl text-sm font-bold text-blue-600">全部</button>
                        <button type="button" onclick="toggleCustomInput(this)" class="count-btn p-2.5 rounded-xl text-sm font-bold">自訂</button>
                    </div>
                    <div id="custom-count-wrapper" class="hidden">
                        <input type="number" id="custom-count-input" min="1" placeholder="請輸入題數" class="w-full p-3 border border-blue-200 rounded-xl bg-blue-50 text-sm font-bold text-blue-700 outline-none" oninput="updateCustomCount(this.value)">
                    </div>
                </div>

                <button onclick="startQuiz(false)" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition">開始一般練習</button>
            </div>
        </div>

        <div id="quiz-section" class="hidden">
            <div class="flex justify-between items-start mb-5 border-b pb-2">
                <div class="flex flex-col">
                    <div class="flex items-center gap-2">
                        <button onclick="exitQuiz()" class="text-[10px] bg-gray-100 text-gray-600 px-2 py-1 rounded font-bold transition">🚪 離開</button>
                        <span id="quiz-progress" class="text-[10px] font-bold text-blue-600"></span>
                    </div>
                    <span id="source-info" class="text-[9px] text-gray-400 mt-1"></span>
                </div>
                <span id="question-type-tag" class="text-[9px] px-2 py-1 rounded font-black text-white"></span>
            </div>
            <div id="question-box">
                <p id="question-text" class="text-base font-bold text-gray-800 mb-6 leading-relaxed"></p>
                <div id="options-container" class="space-y-2.5"></div>
            </div>
            <button id="submit-multi-btn" onclick="submitMultiAnswer()" class="hidden w-full mt-6 bg-blue-500 text-white py-3.5 rounded-xl font-bold">確認送出</button>
            <div id="feedback" class="mt-8 hidden space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div id="feedback-card" class="p-4 rounded-2xl border text-center min-h-[100px] flex flex-col justify-center text-white">
                        <p id="feedback-message" class="font-black text-lg"></p>
                        <p id="correct-ans" class="text-[11px] opacity-80"></p>
                    </div>
                    <button onclick="askGeminiAI()" class="ai-btn text-white rounded-2xl font-bold text-sm flex flex-col items-center justify-center gap-2 shadow-lg">
                        <span class="text-2xl">✨</span>AI 解析
                    </button>
                </div>
                <button onclick="nextQuestion()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-xl shadow-xl">下一題 ➜</button>
            </div>
        </div>

        <div id="result-section" class="hidden py-6">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-gray-800">測驗結束</h2>
                <div class="flex justify-center items-baseline gap-1">
                    <span id="final-stats" class="text-4xl font-black text-blue-600">0</span>
                    <span class="text-gray-400 font-bold">/ <span id="total-stats">0</span> 題</span>
                </div>
            </div>
            <div id="result-list-container" class="border rounded-2xl overflow-hidden mb-8 shadow-sm">
                <div class="bg-gray-50 p-3 border-b text-[10px] font-bold text-gray-500 text-center uppercase">💡 點擊題目進行 AI 解析</div>
                <div class="max-h-96 overflow-y-auto">
                    <table class="w-full text-xs">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr><th class="p-3 text-left w-12 text-gray-400">題號</th><th class="p-3 text-left text-gray-400">內容</th><th class="p-3 text-center w-12 text-gray-400">結果</th></tr>
                        </thead>
                        <tbody id="result-list-body" class="divide-y divide-gray-100 bg-white"></tbody>
                    </table>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold shadow-lg">返回主選單</button>
        </div>
    </div>

    <div id="export-overlay" class="fixed inset-0 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 flex flex-col max-h-[85vh]">
            <h3 class="text-lg font-bold mb-4">📋 匯出錯題筆記</h3>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="generateExport('text')" class="py-2 rounded-lg text-[10px] font-bold bg-blue-50 text-blue-600 border border-blue-100">純文字</button>
                <button onclick="generateExport('markdown')" class="py-2 rounded-lg text-[10px] font-bold bg-gray-50 text-gray-600 border border-gray-100">MD</button>
                <button onclick="exportToCSV()" class="py-2 rounded-lg text-[10px] font-bold bg-green-50 text-green-700 border border-green-100">Excel/CSV</button>
            </div>
            <textarea id="export-text" class="w-full flex-grow p-3 border rounded-xl font-mono text-[10px] mb-4 bg-gray-50 no-scrollbar" readonly placeholder="請選擇格式..."></textarea>
            <div class="flex gap-2">
                <button onclick="copyExportText()" class="flex-grow bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">複製</button>
                <button onclick="closeExportOverlay()" class="px-4 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold">關閉</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let rawData = []; let quizPool = []; let userAnswers = []; let currentIdx = 0;
        let selectedCount = 10; let correctCount = 0; let isErrorMode = false;
        let selectedMultiChoices = [];

        function backupProgress() {
            const data = { mastered: localStorage.getItem('law_mastered_list'), errors: localStorage.getItem('law_error_book') };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `law_backup_${new Date().toLocaleDateString()}.json`; a.click();
            localStorage.setItem('last_backup_timestamp', new Date().toISOString());
            updateBackupTime();
        }

        function updateBackupTime() {
            const lastTime = localStorage.getItem('last_backup_timestamp');
            if (lastTime) { document.getElementById('backup-time-display').innerText = `上次備份：${new Date(lastTime).toLocaleString()}`; }
        }

        function triggerRestoreInput() { document.getElementById('restore-input').click(); }
        function mergeProgress(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const incoming = JSON.parse(e.target.result);
                    let curM = JSON.parse(localStorage.getItem('law_mastered_list') || '[]');
                    let inM = JSON.parse(incoming.mastered || '[]');
                    let combM = [...new Set([...curM, ...inM])];
                    localStorage.setItem('law_mastered_list', JSON.stringify(combM));

                    let curE = JSON.parse(localStorage.getItem('law_error_book') || '[]');
                    let inE = JSON.parse(incoming.errors || '[]');
                    let combE = [...new Set([...curE, ...inE])].filter(id => !combM.includes(id));
                    localStorage.setItem('law_error_book', JSON.stringify(combE));

                    alert("進度已智能合併！"); location.reload();
                } catch (err) { alert("讀取失敗！"); }
            };
            reader.readAsText(file);
        }

        function getMasteredList() { return JSON.parse(localStorage.getItem('law_mastered_list') || '[]'); }
        function addToMastered(uuid) {
            let list = getMasteredList(); if (!list.includes(uuid)) { list.push(uuid); localStorage.setItem('law_mastered_list', JSON.stringify(list)); }
        }
        function isMastered(uuid) { return getMasteredList().includes(uuid); }
        function exitQuiz() { if (confirm("確定放棄目前練習？")) location.reload(); }

        function setCount(num, btn) {
            selectedCount = num;
            document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('custom-count-wrapper').classList.add('hidden');
        }
        function toggleCustomInput(btn) {
            document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('custom-count-wrapper').classList.remove('hidden');
        }
        function updateCustomCount(val) { let num = parseInt(val); if (!isNaN(num)) { selectedCount = Math.max(1, num); } }

        async function loadFromLocal() {
            setTimeout(() => {
                const saved = localStorage.getItem('law_master_db');
                if (saved) { rawData = JSON.parse(saved); showSetup(); } 
                else { document.getElementById('loading-status').classList.add('hidden'); document.getElementById('setup-section').classList.remove('hidden'); }
                updateBackupTime();
            }, 150);
        }
        function showSetup() {
            document.getElementById('loading-status').classList.add('hidden');
            document.getElementById('setup-section').classList.remove('hidden');
            document.getElementById('upload-area').classList.toggle('hidden', rawData.length > 0);
            document.getElementById('config-area').classList.toggle('hidden', rawData.length === 0);
            if (rawData.length > 0) processRawData();
            updateErrorUI();
        }
        function triggerFileInput() { document.getElementById('file-input').click(); }
        window.onload = loadFromLocal;

        document.getElementById('file-input').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                rawData = JSON.parse(event.target.result); 
                localStorage.setItem('law_master_db', JSON.stringify(rawData)); 
                showSetup();
            };
            reader.readAsText(e.target.files[0]);
        });

        function processRawData() {
            const years = new Set(); const subjects = new Set();
            rawData.forEach(item => {
                const yMatch = item.title.match(/\d+年/);
                item._pureYear = yMatch ? yMatch[0] : "未知";
                years.add(item._pureYear);
                item._detectedSubject = item.subject || "法律綜合";
                subjects.add(item._detectedSubject);
            });
            const yS = document.getElementById('year-select'); yS.innerHTML = `<option value="ALL">全年度</option>`;
            Array.from(years).sort().reverse().forEach(y => { yS.innerHTML += `<option value="${y}">${y}</option>`; });
            const sS = document.getElementById('subject-select'); sS.innerHTML = `<option value="ALL">全部科目</option>`;
            Array.from(subjects).sort().forEach(s => { sS.innerHTML += `<option value="${s}">${s}</option>`; });
        }

        function startQuiz(isErr) {
            isErrorMode = isErr;
            const yV = document.getElementById('year-select').value;
            const sV = document.getElementById('subject-select').value;
            const tV = document.getElementById('type-filter').value;
            let pool = [];
            
            if (isErr) {
                const ids = JSON.parse(localStorage.getItem('law_error_book') || '[]');
                pool = rawData.filter(i => ids.includes(i.uuid));
            } else {
                let base = rawData;
                if (yV !== "ALL") base = base.filter(i => i._pureYear === yV);
                if (sV !== "ALL") base = base.filter(i => i._detectedSubject === sV);
                if (tV === "SINGLE") base = base.filter(i => i.answer.length === 1);
                else if (tV === "MULTI") base = base.filter(i => i.answer.length > 1);
                pool = base.filter(i => !isMastered(i.uuid));
                if (pool.length === 0 && base.length > 0) { alert("此分類已全答對，重啟循環。"); pool = base; }
            }
            let finalCount = (selectedCount === 'ALL') ? pool.length : selectedCount;
            quizPool = pool.sort(() => Math.random() - 0.5).slice(0, finalCount);
            if (quizPool.length === 0) return alert("沒題了！");
            currentIdx = 0; correctCount = 0; userAnswers = [];
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizPool[currentIdx]; selectedMultiChoices = [];
            document.getElementById('quiz-progress').innerText = `進度：${currentIdx + 1} / ${quizPool.length}`;
            document.getElementById('source-info').innerText = q.title || "未知";
            const isM = q.answer.length > 1;
            const tag = document.getElementById('question-type-tag');
            tag.innerText = isM ? "複選題" : "單選題";
            tag.className = `text-[9px] px-2 py-1 rounded font-black ${isM ? 'bg-blue-800' : 'bg-gray-800'} text-white`;
            document.getElementById('submit-multi-btn').classList.toggle('hidden', !isM);
            document.getElementById('question-text').innerText = `${q.number ? q.number + '. ' : ''}${q.content}`;
            document.getElementById('feedback').classList.add('hidden');
            const container = document.getElementById('options-container'); container.innerHTML = '';
            Object.entries(q.options || {}).forEach(([l, t]) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 border rounded-xl bg-white shadow-sm flex items-start text-sm";
                btn.innerHTML = `<span class="font-bold mr-3 text-gray-300">${l}</span> <span>${t}</span>`;
                btn.onclick = () => { if (isM) toggleMultiChoice(l, btn); else checkAnswer(l, btn); };
                container.appendChild(btn);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleMultiChoice(l, btn) {
            const i = selectedMultiChoices.indexOf(l);
            if (i > -1) { selectedMultiChoices.splice(i, 1); btn.classList.remove('ring-2', 'ring-blue-500'); }
            else { selectedMultiChoices.push(l); btn.classList.add('ring-2', 'ring-blue-500'); }
        }
        function submitMultiAnswer() { if (selectedMultiChoices.length === 0) return alert("選答案！"); checkAnswer(selectedMultiChoices.sort().join(''), null); }

        function checkAnswer(choice, btn) {
            const q = quizPool[currentIdx]; document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            const isC = (choice === q.answer);
            const fb = document.getElementById('feedback-card');
            userAnswers.push({ uuid: q.uuid, num: q.number || (currentIdx+1), content: q.content, isCorrect: isC, originalQ: q });

            if (isC) {
                if (btn) btn.classList.add('bg-green-100', 'border-green-500');
                document.getElementById('feedback-message').innerText = `正確！🎯`;
                fb.className = "p-4 rounded-2xl border bg-green-500 text-center text-white";
                correctCount++; if (isErrorMode) removeError(q.uuid); addToMastered(q.uuid);
            } else {
                if (btn) btn.classList.add('bg-red-100', 'border-red-500');
                document.getElementById('feedback-message').innerText = "答錯了 💡";
                fb.className = "p-4 rounded-2xl border bg-red-500 text-center text-white";
                addError(q.uuid);
            }
            document.getElementById('correct-ans').innerText = `正確答案：(${q.answer})`;
            document.getElementById('feedback').classList.remove('hidden'); updateErrorUI();
        }

        function nextQuestion() { currentIdx++; if (currentIdx < quizPool.length) renderQuestion(); else showResult(); }

        function showResult() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('final-stats').innerText = correctCount;
            document.getElementById('total-stats').innerText = quizPool.length;
            const body = document.getElementById('result-list-body'); body.innerHTML = '';
            userAnswers.forEach((r) => {
                const tr = document.createElement('tr');
                tr.className = `border-b cursor-pointer hover:bg-gray-50 transition ${r.isCorrect ? 'bg-white' : 'bg-red-50'}`;
                tr.onclick = () => runAIAnalysis(r.originalQ);
                tr.innerHTML = `<td class="p-3 text-center font-bold text-gray-400">${r.num}</td><td class="p-3 line-clamp-1">${r.content}</td><td class="p-3 text-center">${r.isCorrect ? '✅' : '❌'}</td>`;
                body.appendChild(tr);
            });
        }

        async function runAIAnalysis(q) {
            const opt = Object.entries(q.options).map(([l, t]) => `(${l}) ${t}`).join('\n');
            const prompt = `分析法律題目：\n【科目】${q.subject || '法律綜合'}\n【出處】${q.title}\n【題目】\n${q.content}\n\n【選項】\n${opt}\n\n【正確答案】\n(${q.answer})\n\n請詳解法理爭點與相關條文。`;
            navigator.clipboard.writeText(prompt); alert("AI指令已複製！"); window.open("https://gemini.google.com/app", "_blank");
        }
        function askGeminiAI() { runAIAnalysis(quizPool[currentIdx]); }

        function addError(id) { let e = JSON.parse(localStorage.getItem('law_error_book') || '[]'); if (!e.includes(id)) { e.push(id); localStorage.setItem('law_error_book', JSON.stringify(e)); } }
        function removeError(id) { let e = JSON.parse(localStorage.getItem('law_error_book') || '[]'); localStorage.setItem('law_error_book', JSON.stringify(e.filter(i => i !== id))); }

        function updateErrorUI() { 
            const ids = JSON.parse(localStorage.getItem('law_error_book') || '[]');
            const curE = ids.filter(id => rawData.some(i => i.uuid === id));
            document.getElementById('error-count').innerText = curE.length;
            document.getElementById('error-notice').classList.toggle('hidden', curE.length === 0);
        }

        function clearErrorBook() { if (confirm("確定清空數據？")) { localStorage.clear(); location.reload(); } }

        function openExportModal() { document.getElementById('export-overlay').classList.remove('hidden'); generateExport('text'); }
        function closeExportOverlay() { document.getElementById('export-overlay').classList.add('hidden'); }
        
        function generateExport(format) {
            const ids = JSON.parse(localStorage.getItem('law_error_book') || '[]');
            const items = rawData.filter(i => ids.includes(i.uuid));
            let t = (format === 'text') ? `⚖️ 錯題筆記 (${new Date().toLocaleDateString()})\n\n` : `# ⚖️ 錯題集 (${new Date().toLocaleDateString()})\n\n`;
            if (items.length === 0) { document.getElementById('export-text').value = "當前科目無錯題。"; return; }
            items.forEach((item, idx) => {
                const optStr = Object.entries(item.options || {}).map(([k, v]) => format === 'text' ? `(${k}) ${v}` : `- **(${k})** ${v}`).join('\n');
                if (format === 'text') { t += `${idx+1}. [${item._detectedSubject}] ${item.title}\n題目：${item.content}\n選項：\n${optStr}\n答案：(${item.answer})\n\n---\n\n`; }
                else { t += `### ${idx+1}. ${item.title}\n**科目：** \`${item._detectedSubject}\`\n\n> ${item.content}\n\n**選項：**\n${optStr}\n\n**正確答案**：\`(${item.answer})\`\n\n---\n\n`; }
            });
            document.getElementById('export-text').value = t;
        }

        // --- CSV 匯出功能 ---
        function exportToCSV() {
            const ids = JSON.parse(localStorage.getItem('law_error_book') || '[]');
            const items = rawData.filter(i => ids.includes(i.uuid));
            if (items.length === 0) return alert("無錯題可匯出");
            
            let csv = "\ufeff題號,科目,出處,題目,選項,正確答案\n";
            items.forEach((i, idx) => {
                const opt = Object.entries(i.options).map(([k,v])=>`(${k})${v}`).join(' ');
                csv += `"${idx+1}","${i._detectedSubject}","${i.title}","${i.content.replace(/"/g, '""')}","${opt.replace(/"/g, '""')}","${i.answer}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `律師錯題筆記_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        async function copyExportText() { await navigator.clipboard.writeText(document.getElementById('export-text').value); alert("複製成功！"); }
    </script>
</body>
